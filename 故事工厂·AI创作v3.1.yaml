    nodes:
    - data:
        desc: 输入故事创作参数
        selected: false
        title: 开始
        type: start
        variables:
        - label: 目标字数
          max_length: 10
          options: []
          required: true
          type: number
          variable: word_count
          default: '3000'
        - label: 故事类型
          max_length: 50
          options:
          - 玄幻
          - 科幻
          - 悬疑
          - 言情
          - 武侠
          - 都市
          - 奇幻
          - 历史
          - 历史架空
          - 恐怖
          - 校园
          - 末日
          - 仙侠
          required: true
          type: select
          variable: genre
          default: 玄幻
        - label: 故事背景
          max_length: 500
          options: []
          required: true
          type: paragraph
          variable: setting
          default: 一个名为"青云大陆"的修仙世界，宗门林立，强者为尊。主角出生于偏远小城的普通家族。
        - label: 世界观设定
          max_length: 1000
          options: []
          required: true
          type: paragraph
          variable: worldview
          default: '修炼体系：练气→筑基→金丹→元婴→化神→渡劫。宗门势力：正道三大宗门（天剑宗、丹霞阁、玄音谷），魔道两宗（血煞宗、影月门）。货币：灵石。特殊设定：存在远古遗迹和秘境。'
        - label: 主角名字
          max_length: 50
          options: []
          required: true
          type: text-input
          variable: protagonist_name
          default: 林逸
        - label: 叙事视角
          max_length: 50
          options:
          - 第三人称全知
          - 第三人称限制（主角视角）
          - 第一人称（主角）
          - 第一人称（旁观者）
          required: false
          type: select
          variable: narrative_pov
          default: 第三人称限制（主角视角）
        - label: 文风偏好
          max_length: 200
          options: []
          required: false
          type: paragraph
          variable: style_preference
          default: 节奏明快，情节紧凑，注重战斗场面描写
        - label: 硬性约束
          max_length: 300
          options: []
          required: false
          type: paragraph
          variable: hard_constraints
