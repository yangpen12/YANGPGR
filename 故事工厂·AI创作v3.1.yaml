    - data:
        context:
          enabled: false
          variable_selector: []
        desc: 结构化审核大纲质量，输出通过/不通过及具体问题
        model:
          completion_params:
            temperature: 0.3
            max_tokens: 2048
          mode: chat
          name: qwen3.5-plus
          provider: langgenius/tongyi/tongyi
        prompt_template:
        - id: sys-outline-check
          role: system
          text: "你是一位严格的稿件审核编辑，负责验证故事大纲的质量。请按以下维度评估大纲，输出结构化的审查结果。\n\n**审核维度：**\n1. **结构完整性：** 四幕结构是否齐全？每幕有关键事件吗？字数比例加起来是否为100%？\n2. **角色合理性：** 主角动机是否清晰？成长弧线是否合理？配角是否必要？\n3. **冲突设计：** 核心冲突是否明确？是否有递进关系？\n4. **设定一致性：** 是否有与用户世界观矛盾的内容？named_entities 是否与世界观风格一致？\n5. **可行性：** 在目标字数内能否完成这个大纲？是否存在情节过于复杂的问题？\n\n**输出格式（严格JSON）：**\n```json\n{\n  \"pass\": true,\n  \"score\": 8,\n  \"issues\": [\n    {\"severity\": \"critical\", \"category\": \"结构\", \"description\": \"问题描述\", \"suggestion\": \"修改建议\"}\n  ],\n  \"strengths\": [\"优点1\",\"优点2\"]\n}\n```\n\n- `pass`: true=通过(仅含建议级问题)，false=不通过(含严重问题)\n- `score`: 1-10分\n- `severity`: critical=必须修复, suggestion=建议优化\n**重要：只输出JSON，不要输出其他任何内容。**"
        - id: user-outline-check
          role: user
          text: '**创作参数：**

            - 目标字数：{{#1000000000001.word_count#}} 字

            - 故事类型：{{#1000000000001.genre#}}

            - 世界观设定：{{#1000000000001.worldview#}}

            - 主角名字：{{#1000000000001.protagonist_name#}}

            - 硬性约束：{{#1000000000001.hard_constraints#}}


            **待审核大纲：**

            {{#1000000000002.text#}}'
        selected: false
        title: 大纲校验
        type: llm
        variables: []
        vision:
          enabled: false
      height: 137
      id: '1000000000003'
      position:
        x: 638
        y: 250
      positionAbsolute:
        x: 638
        y: 250
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "import json\ndef main(arg1: str, arg2: str) -> dict:\n    \"\"\"arg1=大纲JSON, arg2=字数，生成包含完整提示的段落数组\"\"\"\n    try:\n        outline = json.loads(arg1)\n    except:\n        outline = {\"plot_structure\": [\n            {\"act\":1,\"name\":\"第一幕\",\"description\":\"开端\",\"key_events\":[\"事件\"],\"word_ratio\":\"25%\"},\n            {\"act\":2,\"name\":\"第二幕\",\"description\":\"发展\",\"key_events\":[\"事件\"],\"word_ratio\":\"25%\"},\n            {\"act\":3,\"name\":\"第三幕\",\"description\":\"高潮\",\"key_events\":[\"事件\"],\"word_ratio\":\"25%\"},\n            {\"act\":4,\"name\":\"第四幕\",\"description\":\"结局\",\"key_events\":[\"事件\"],\"word_ratio\":\"25%\"}\n        ]}\n    target = int(arg2) if arg2 else 5000\n    acts = outline.get(\"plot_structure\", [])\n    if not acts:\n        acts = [{\"act\":i+1,\"name\":f\"第{i+1}幕\",\"description\":\"\",\"key_events\":[],\"word_ratio\":\"25%\"} for i in range(4)]\n    total_acts = len(acts)\n    segments = []\n    for i, a in enumerate(acts):\n        ratio = a.get(\"word_ratio\",\"25%\").replace(\"%\",\"\")\n        try:\n            pct = float(ratio) / 100\n        except:\n            pct = 0.25\n        target_words = int(target * pct)\n        # 构建完整的提示文本\n        prompt = f\"\"\"**完整大纲：**\n{arg1}\n\n**当前幕信息：**\n- 第 {i+1} 幕（共 {total_acts} 幕）\n- 幕名：{a.get('name','')}\n- 描述：{a.get('description','')}\n- 关键事件：{json.dumps(a.get('key_events',[]), ensure_ascii=False)}\n- 目标字数：{target_words} 字\n\n**写作指令：**\n请根据以上信息撰写当前幕的故事内容。\n- 目标字数：{target_words} 字\n- 严格遵循大纲中各幕的逻辑顺序和情节衔接\n- **只输出当前幕的故事正文**\"\"\"\n        segments.append(prompt)\n    result = {\"segments\": segments, \"outline_json\": arg1}\n    return result\n"
        desc: 将大纲按幕拆分为迭代数组，计算各幕目标字数
        code_language: python3
        outputs:
          segments:
            children: null
            type: array[string]
          outline_json:
            children: null
            type: string
        selected: false
